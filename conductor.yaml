# ClawConductor configuration

upstream_url: http://localhost:8766

routing_lane:
  tier: lightweight

escalation_lane:
  tier: advanced

# Tier → model resolution (used by key_selector.resolve_model)
tiers:
  lightweight: tier/lightweight
  standard: tier/standard
  advanced: tier/advanced

# Actual model names to surface in responses (for status bar observability)
tier_display_models:
  lightweight: claude-haiku-4-5
  standard: claude-sonnet-4-6
  advanced: claude-sonnet-4-6

# Context window limit for threshold warnings (must match openclaw.json contextTokens)
context_token_limit: 40000

# Cooldown (seconds) after a Group A escalation before the same keyword can
# trigger another Group-A-only escalation. Prevents carry-over false positives
# from follow-up messages that reference the original task. Set to 0 to disable.
group_a_cooldown_seconds: 300

# Budget fallback: free model to use when a lane's daily budget is exceeded
budget_fallback:
  model: gemini-2.5-flash
  display_name: Gemini 2.5 Flash

# LiteLLM virtual keys per lane (set to your actual keys)
litellm_keys:
  routing: os.environ/CLAWCONDUCTOR_ROUTING_KEY
  escalation: os.environ/CLAWCONDUCTOR_ESCALATION_KEY
  fallback: os.environ/CLAWCONDUCTOR_FALLBACK_KEY

# Multi-word phrase triggers for Group A — opt-in only.
# Phrase matching is disabled when this list is empty.
# Uncomment and paste phrases from the Layperson template in the README to enable.
# Each item is matched as a case-insensitive substring of the user message.
trigger_phrases: []

# Escalation thresholds — both values default to 2 if this block is absent.
escalation:
  # Consecutive tool failures before Group B fires.
  group_b_failure_threshold: 2
  # Number of retries before Group D (validation failed on retry) fires.
  max_retries: 2

# Group A escalation trigger words — edit this list to match your agent's vocabulary.
# Each item may be a single word or a comma-separated string of words.
trigger_words:
  - plan
  - design
  - architecture
  - debug
  - debugging
  - strategy
  - synthesis
  - research
  - refactor
  - optimize
  - migrate
  - audit
  - review
  - diagnose
  - evaluate
  - analyze
  - compare
  - recommend
