<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#12111c"/>

  <!-- Baton shaft (gold) -->
  <line x1="10" y1="54" x2="40" y2="23"
        stroke="#e8b830" stroke-width="5" stroke-linecap="round"/>

  <!-- Three routing/claw lines fanning from baton tip -->
  <line x1="40" y1="23" x2="57" y2="8"
        stroke="#4090ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="23" x2="60" y2="23"
        stroke="#6860ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="23" x2="56" y2="38"
        stroke="#9840e8" stroke-width="3" stroke-linecap="round"/>

  <!-- Handle knob -->
  <circle cx="10" cy="54" r="7"   fill="#b87c18"/>
  <circle cx="10" cy="54" r="4.5" fill="#e8b830"/>
  <circle cx="10" cy="54" r="2.5" fill="#ffd870"/>
</svg>
